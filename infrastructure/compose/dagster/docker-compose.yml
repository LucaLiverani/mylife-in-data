# Dagster — webserver + daemon + Postgres metadata DB.
# All credentials come from .env (gitignored). No plaintext defaults committed.

services:
  dagster-postgres:
    image: postgres:16-alpine
    container_name: dagster-postgres
    environment:
      POSTGRES_USER: ${DAGSTER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD}
      POSTGRES_DB: ${DAGSTER_POSTGRES_DB}
    volumes:
      - dagster-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-platform-network
    restart: unless-stopped

  dagster-webserver:
    build:
      context: ../../..
      dockerfile: infrastructure/compose/dagster/Dockerfile
    image: mylife-dagster:latest
    container_name: dagster-webserver
    command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-w", "/opt/dagster/workspace.yaml"]
    environment: &dagster-env
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_POSTGRES_USER: ${DAGSTER_POSTGRES_USER}
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD}
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB}
      DAGSTER_POSTGRES_HOST: dagster-postgres
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST}
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT}
      CLICKHOUSE_HTTP_PORT: ${CLICKHOUSE_HTTP_PORT}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_ENDPOINT: ${R2_ENDPOINT}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      GOOGLE_ACCOUNT_EMAIL: ${GOOGLE_ACCOUNT_EMAIL}
      GOOGLE_TOKEN_AGE_ALERT_DAYS: ${GOOGLE_TOKEN_AGE_ALERT_DAYS:-90}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      CALENDAR_WEBHOOK_TOKEN: ${CALENDAR_WEBHOOK_TOKEN}
      GOOGLE_REAUTH_STATE_SECRET: ${GOOGLE_REAUTH_STATE_SECRET}
      # Laptop ↔ VM split: VM sets both to 1, laptop leaves them unset/0.
      # MYLIFE_TOKEN_WRITER gates google_oauth.persist_to_clickhouse and
      # google_token_health alert writes. DAGSTER_SCHEDULES_ENABLED gates
      # schedule + sensor registration in definitions.py.
      MYLIFE_TOKEN_WRITER: ${MYLIFE_TOKEN_WRITER:-0}
      DAGSTER_SCHEDULES_ENABLED: ${DAGSTER_SCHEDULES_ENABLED:-0}
    volumes:
      - dagster-home:/opt/dagster/dagster_home
      - ../../..:/opt/dagster/repo:ro
      - ../../../tokens:/opt/dagster/tokens:ro
      # dbt needs to write target/ and logs/ inside the project; RW required.
      - ../../../transformations:/opt/dagster/transformations
    ports:
      - "${DAGSTER_PORT:-3000}:3000"
    depends_on:
      dagster-postgres:
        condition: service_healthy
    networks:
      - data-platform-network
    restart: unless-stopped

  dagster-daemon:
    build:
      context: ../../..
      dockerfile: infrastructure/compose/dagster/Dockerfile
    image: mylife-dagster:latest
    container_name: dagster-daemon
    command: ["dagster-daemon", "run", "-w", "/opt/dagster/workspace.yaml"]
    environment: *dagster-env
    volumes:
      - dagster-home:/opt/dagster/dagster_home
      - ../../..:/opt/dagster/repo:ro
      - ../../../tokens:/opt/dagster/tokens:ro
      # dbt needs to write target/ and logs/ inside the project; RW required.
      - ../../../transformations:/opt/dagster/transformations
    depends_on:
      dagster-postgres:
        condition: service_healthy
    networks:
      - data-platform-network
    restart: unless-stopped

  spotify-current-producer:
    # Same image as Dagster (already has spotipy + kafka-python).
    # Only started when the `producer` profile is enabled (VM only). Laptop
    # starts the dagster stack without --profile, so this stays down.
    image: mylife-dagster:latest
    container_name: spotify-current-producer
    command: ["python", "/opt/dagster/repo/ingestion/spotify/producer_current.py"]
    environment: *dagster-env
    profiles:
      - producer
    volumes:
      - ../../..:/opt/dagster/repo:ro
      - ../../../tokens:/opt/dagster/tokens:ro
    networks:
      - data-platform-network
    restart: unless-stopped
    depends_on:
      dagster-webserver:
        condition: service_started

volumes:
  dagster-postgres-data:
  dagster-home:

networks:
  data-platform-network:
    external: true
