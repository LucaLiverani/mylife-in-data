# Dagster — webserver + daemon + Postgres metadata DB.
# All credentials come from .env (gitignored). No plaintext defaults committed.

services:
  dagster-postgres:
    image: postgres:16-alpine
    container_name: dagster-postgres
    environment:
      POSTGRES_USER: ${DAGSTER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD}
      POSTGRES_DB: ${DAGSTER_POSTGRES_DB}
    volumes:
      - dagster-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-platform-network
    restart: unless-stopped

  dagster-webserver:
    build:
      context: ../../..
      dockerfile: infrastructure/compose/dagster/Dockerfile
    image: mylife-dagster:latest
    container_name: dagster-webserver
    command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-w", "/opt/dagster/workspace.yaml"]
    environment: &dagster-env
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_POSTGRES_USER: ${DAGSTER_POSTGRES_USER}
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD}
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB}
      DAGSTER_POSTGRES_HOST: dagster-postgres
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST}
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
    volumes:
      - dagster-home:/opt/dagster/dagster_home
      - ../../..:/opt/dagster/repo:ro
    ports:
      - "${DAGSTER_PORT:-3000}:3000"
    depends_on:
      dagster-postgres:
        condition: service_healthy
    networks:
      - data-platform-network
    restart: unless-stopped

  dagster-daemon:
    build:
      context: ../../..
      dockerfile: infrastructure/compose/dagster/Dockerfile
    image: mylife-dagster:latest
    container_name: dagster-daemon
    command: ["dagster-daemon", "run", "-w", "/opt/dagster/workspace.yaml"]
    environment: *dagster-env
    volumes:
      - dagster-home:/opt/dagster/dagster_home
      - ../../..:/opt/dagster/repo:ro
    depends_on:
      dagster-postgres:
        condition: service_healthy
    networks:
      - data-platform-network
    restart: unless-stopped

volumes:
  dagster-postgres-data:
  dagster-home:

networks:
  data-platform-network:
    external: true
