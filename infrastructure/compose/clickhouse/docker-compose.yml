# ClickHouse — columnar OLAP warehouse + Keeper (ZK replacement).
# User, password, and broker hostnames all come from env vars in
# infrastructure/.env (gitignored). No identity or credentials are committed.

services:

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: clickhouse
    hostname: clickhouse
    depends_on:
      clickhouse-keeper:
        condition: service_healthy
    environment:
      # The image entrypoint reads these and generates users.d/default-user.xml
      # with the matching user definition + access_management.
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-default}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9200}:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./config/config.xml:/etc/clickhouse-server/config.d/config.xml:ro
      - ./config/kafka.xml:/etc/clickhouse-server/config.d/kafka.xml:ro
      - ./config/zookeeper.xml:/etc/clickhouse-server/config.d/zookeeper.xml:ro
    networks:
      - data-platform-network
    restart: unless-stopped
    healthcheck:
      # $$ defers var expansion to the container shell — no secrets in this file.
      test: ["CMD-SHELL", "clickhouse-client --user \"$$CLICKHOUSE_USER\" --password \"$$CLICKHOUSE_PASSWORD\" --query 'SELECT 1'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 16G
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  clickhouse-keeper:
    image: clickhouse/clickhouse-keeper:24.8-alpine
    container_name: clickhouse-keeper
    hostname: clickhouse-keeper
    ports:
      - "9181:9181"
    volumes:
      - clickhouse-keeper-data:/var/lib/clickhouse/coordination
      - clickhouse-keeper-logs:/var/log/clickhouse-keeper
      - ./config/keeper_config.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
    networks:
      - data-platform-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clickhouse-keeper-client", "-h", "localhost", "-p", "9181", "--query=ruok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

volumes:
  clickhouse-data:
    driver: local
  clickhouse-logs:
    driver: local
  clickhouse-keeper-data:
    driver: local
  clickhouse-keeper-logs:
    driver: local

networks:
  data-platform-network:
    external: true
