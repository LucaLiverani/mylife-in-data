# Prometheus + Grafana + the alerting stack.
# Grafana creds come from .env (gitignored). No plaintext in this file.
#
# Alertmanager only runs where ALERTING_ENABLED=1 (the VM): start-all.sh and
# deploy.sh add `--profile alerting`. Everything else also runs on the laptop;
# locally alerts evaluate and render in Grafana but never deliver anywhere.

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    environment:
      # Stamped into external_labels (expand-external-labels) → alert emails
      # say which environment fired.
      PLATFORM_ENV: ${PLATFORM_ENV:-local}
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--enable-feature=expand-external-labels'
    networks:
      - data-platform-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - data-platform-network
    restart: unless-stopped

  # Email egress for everything: Prometheus rules and the Dagster failure
  # sensor both deliver through here → alert-mailer Worker → inbox.
  # The committed alertmanager.yml references /tmp/alert_webhook_{url,token};
  # the entrypoint writes those from .env so neither lands in the public repo.
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    profiles:
      - alerting
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    # No host port on purpose: 9093 is taken by Redpanda's external Kafka
    # listener, and every client (Prometheus, the Dagster sensor, amtool via
    # docker exec) reaches alertmanager:9093 on the container network.
    environment:
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      ALERT_WEBHOOK_TOKEN: ${ALERT_WEBHOOK_TOKEN:-}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        printf '%s' "$$ALERT_WEBHOOK_URL" > /tmp/alert_webhook_url &&
        printf '%s' "$$ALERT_WEBHOOK_TOKEN" > /tmp/alert_webhook_token &&
        exec /bin/alertmanager
        --config.file=/etc/alertmanager/alertmanager.yml
        --storage.path=/alertmanager
    networks:
      - data-platform-network
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    pid: host
    volumes:
      - /:/host:ro,rslave
    command:
      - '--path.rootfs=/host'
    networks:
      - data-platform-network
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks:
      - data-platform-network
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    volumes:
      - ./blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - data-platform-network
    restart: unless-stopped

networks:
  data-platform-network:
    external: true

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:
