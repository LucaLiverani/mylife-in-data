global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'data-platform'
    environment: 'local'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'clickhouse'
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ['clickhouse:8123']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'clickhouse'

  # Redpanda exposes Prometheus metrics on its admin port.
  - job_name: 'redpanda'
    metrics_path: /public_metrics
    scheme: http
    static_configs:
      - targets: ['redpanda:9644']

  # Dagster metrics (when DAGSTER_PROMETHEUS_METRICS_ENABLED=true is set).
  # - job_name: 'dagster'
  #   static_configs:
  #     - targets: ['dagster-webserver:3000']
