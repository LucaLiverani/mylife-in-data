version: '3.8'

services:
  spotify-current-producer:
    build:
      # Build context is the repo root so we can copy the whole ingestion/ tree
      context: ../..
      dockerfile: ingestion/spotify/Dockerfile
    image: spotify-producer:latest
    container_name: spotify-current-producer
    environment:
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI}
      SPOTIFY_TOKEN_CACHE_PATH: /app/tokens/.spotify_cache
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: spotify.player.current
      POLL_INTERVAL: 1
      PYTHONUNBUFFERED: 1
    volumes:
      # Persistent token cache lives at repo root
      - ../../tokens:/app/tokens:rw
      - ./logs/producer:/app/logs
    networks:
      - data-platform-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "current_playing_producer.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

networks:
  data-platform-network:
    external: true
