# CI gates — zero secrets by design (public repo; fork PRs are safe because
# there is nothing to steal and nothing here can reach the VM).
# Design doc: docs/DEPLOY.md.
#
# Invariant worth repeating: `dagster definitions validate` exits 0 even when
# a dbt model is broken (the import-time bootstrap in
# orchestration/dagster/assets/dbt.py swallows the parse failure and silently
# drops all dbt assets). The separate failing `dbt parse` step IS the dbt gate.

name: ci

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: infrastructure/compose/dagster/Dockerfile

      # Mirror the (unpinned) dependency list from the Dagster image so CI
      # fails on the same upstream breakage a VM image rebuild would hit.
      - name: Install Dagster image dependencies
        run: |
          pip install --quiet \
            dagster dagster-webserver dagster-postgres dagster-dbt dagster-aws \
            dbt-core dbt-clickhouse clickhouse-connect kafka-python jsonschema \
            spotipy google-auth google-auth-oauthlib google-api-python-client \
            pendulum python-dotenv requests boto3

      # DbtCliResource pydantic-validates this exact absolute path at
      # Definitions construction time.
      - name: Recreate container paths
        run: |
          sudo mkdir -p /opt/dagster
          sudo ln -s "$GITHUB_WORKSPACE/transformations" /opt/dagster/transformations
          cp transformations/profiles.yml.example transformations/profiles.yml

      # MUST stay a separate failing step (see header comment).
      - name: dbt parse
        run: |
          dbt parse \
            --project-dir /opt/dagster/transformations \
            --profiles-dir /opt/dagster/transformations

      - name: dagster definitions validate
        env:
          DAGSTER_SCHEDULES_ENABLED: "1" # exercise schedule/job registration
          PYTHONPATH: ${{ github.workspace }}
        run: |
          export DAGSTER_HOME="$RUNNER_TEMP/dagster_home"
          mkdir -p "$DAGSTER_HOME"
          dagster definitions validate -f orchestration/dagster/definitions.py

      # Stream contract gate: the now-playing producer, its JSON Schema, and
      # the ClickHouse Kafka-engine DDL must describe the same wire format.
      - name: Stream contract check (spotify.player.current)
        run: python scripts/check_stream_contract.py

  dashboard-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Build
        run: npm run build

      # The committed mocks must match what the generator produces (seeded
      # PRNG + frozen date, so this is deterministic).
      - name: Mock-generator drift check
        run: |
          npm run seed
          git diff --exit-code -- public/mocks

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      # Boots wrangler pages dev against dist/ (no Cloudflare auth needed),
      # asserts every mock-backed /api/* endpoint serves the mocks fallback,
      # and screens all routes for horizontal overflow at mobile width.
      - name: Smoke test (mocks-backed)
        run: npm run smoke

  ddl-idempotency:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.8-alpine # same pin as prod
        env:
          # The image's passwordless `default` user refuses remote connections
          # (the published port counts as remote); mint an explicit CI user.
          CLICKHOUSE_USER: ci
          CLICKHOUSE_PASSWORD: ci
        ports:
          - 8123:8123
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Wait for ClickHouse
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://localhost:8123/ping && exit 0
            sleep 2
          done
          echo "ClickHouse never became ready" >&2
          exit 1

      # Twice on purpose: proves every DDL file stays CREATE-only/idempotent.
      - name: Apply DDL (first pass)
        run: CLICKHOUSE_DDL_HOST=localhost CLICKHOUSE_USER=ci CLICKHOUSE_PASSWORD=ci bash warehouse/ddl/apply.sh

      - name: Apply DDL (second pass, must also succeed)
        run: CLICKHOUSE_DDL_HOST=localhost CLICKHOUSE_USER=ci CLICKHOUSE_PASSWORD=ci bash warehouse/ddl/apply.sh

  # Ships the dashboard on push to main once every gate passed, so one
  # promotion deploys BOTH halves (the backend deploy is the VM's pull).
  # The only secrets in the system: a Pages-scoped Cloudflare API token +
  # account id — neither can reach the VM. Manual/emergency fallback:
  # dashboard/scripts/deploy-to-pages.sh.
  deploy-dashboard:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend-validate, dashboard-smoke, ddl-idempotency]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # the pushed range can span many commits (ff from dev)

      # Deploy only when dashboard/ changed anywhere in the pushed range
      # (github.event.before..sha), not just the head commit.
      - name: Detect dashboard changes
        id: changed
        working-directory: .
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "$BEFORE" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT" # unknown base: deploy to be safe
          elif git diff --quiet "$BEFORE" "${{ github.sha }}" -- dashboard/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "dashboard/ untouched in this push — skipping deploy."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.changed.outputs.changed == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: npm ci
        if: steps.changed.outputs.changed == 'true'
        run: npm ci

      - name: Build
        if: steps.changed.outputs.changed == 'true'
        run: npm run build

      - name: Deploy to Cloudflare Pages (production)
        if: steps.changed.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not configured — skipping Pages deploy (ship manually with deploy-to-pages.sh)."
            exit 0
          fi
          npx wrangler pages deploy dist --branch=main --commit-hash="${{ github.sha }}"

      # Informational only: X-Data-Source live = warehouse reachable, cache =
      # serving mocks (tunnel/CH issue, not a deploy failure).
      - name: Post-deploy probe
        if: steps.changed.outputs.changed == 'true'
        run: curl -sI https://mylife-in-data.com/api/system/health | grep -i 'x-data-source' || true

  # Explicit deployable marker the deploy tooling gates on. A classic commit
  # status (not a check run): raw check-runs queries pass vacuously in the
  # seconds after a push, before any runs are created; this status exists only
  # after every gate above succeeded.
  deployable:
    if: github.event_name == 'push'
    needs: [backend-validate, dashboard-smoke, ddl-idempotency]
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Post ci/deployable commit status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state=success \
            -f context=ci/deployable \
            -f description="All CI gates passed"
