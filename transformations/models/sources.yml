version: 2

# Sources declared here are tracked by dbt for ref() lineage and freshness.
# Real bronze tables are created by warehouse/ddl/*.sql files — this is just
# the manifest dbt sees.

sources:
  - name: bronze
    description: "Raw, append-only event tables populated by Dagster producers."
    schema: bronze
    tables:
      - name: spotify_player_current
      - name: spotify_plays_raw
      - name: spotify_tracks
      - name: spotify_artists
      - name: spotify_saved_tracks
      - name: maps_activity
        description: "Per-event Maps activity (search/view/directions) from MyActivity DP export."
      - name: maps_place_catalog
        description: "Cached Places API + Geocoding lookups. Monotonic — each place looked up once."
      - name: youtube_watch_history
      - name: youtube_search_history
      - name: youtube_videos
      - name: youtube_channels
      - name: calendar_events
      - name: calendar_sync_notifications
