version: 2

# Sources declared here are tracked by dbt for ref() lineage and freshness.
# Real bronze tables are created by warehouse/ddl/*.sql files — this is just
# the manifest dbt sees.

sources:
  - name: bronze
    description: "Raw, append-only event tables populated by Dagster producers."
    schema: bronze
    tables:
      - name: spotify_player_current
        description: "Polls of /me/player/currently-playing, deduped by (track_id, captured_at)."
      - name: spotify_plays_raw
        description: "/me/player/recently-played pulls, deduped by (track_id, played_at)."
      - name: spotify_tracks
        description: "Track metadata catalog, ReplacingMergeTree by track_id."
      - name: spotify_artists
        description: "Artist metadata catalog (genres live here)."
      - name: spotify_saved_tracks
        description: "Saved (Liked) tracks from /me/tracks; dedup by (track_id, added_at)."
