name: 'mylife'
version: '1.0.0'
config-version: 2

profile: 'mylife'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

vars:
  # Override at run time (`dbt run --vars '{trip_window_days: 30}'`).
  trip_window_days: 365

  # Shared start date for every headline KPI (the metric cards on each source
  # page + the home overview). All sources are floored to this one date so the
  # numbers are comparable instead of each spanning a different history.
  # YouTube's "My Activity" export only reaches ~2024-12, which is why the
  # common floor can't be earlier. Change this + rebuild gold to adjust:
  #   dbt run --vars '{kpi_start_date: 2024-12-09}'  (or edit here)
  kpi_start_date: '2025-01-01'

  # Streaming-first Spotify metrics (silver_spotify_plays_stream / _merged):
  # how long a track must stay current before the now-playing stream counts it
  # as a play, and the +/- window the watermark merge uses to recognise a stream
  # tip play that the recently-played pull has already reconciled (drops it so it
  # is never double-counted). Both in seconds.
  spotify_stream_dwell_seconds: 30
  spotify_stream_dedup_window_seconds: 120

models:
  mylife:
    silver:
      +schema: silver
      +materialized: view
    gold:
      +schema: gold
      +materialized: view

# Note: the original on-run-end hook ran `{{ run_query('SELECT 1') }}` —
# which executes immediately at template-render time and returns an
# AgateTable that dbt then formatted as a markdown table and tried to run
# as SQL. That broke `dbt build` with a SYNTAX_ERROR. Tests are already
# part of `dbt build` (model + tests + on-run-end), so no extra hook needed.
