name: 'mylife'
version: '1.0.0'
config-version: 2

profile: 'mylife'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

vars:
  # Override at run time (`dbt run --vars '{trip_window_days: 30}'`).
  trip_window_days: 365

models:
  mylife:
    silver:
      +schema: silver
      +materialized: view
    gold:
      +schema: gold
      +materialized: view

# Re-test everything on every `dbt run`. Hard-fails the run if any test fails;
# we lean on this in CI / Dagster to surface schema drift early.
on-run-end:
  - "{{ run_query('SELECT 1') }}"
