<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Life in Data</title>
    <meta name="author" content="Luca Liverani" />
    <meta
      name="description"
      content="A personal data platform that pulls my own history out of Spotify, YouTube, Google Maps and Calendar, then makes sense of it in public. Pretty charts, brutal honesty, optional self-improvement."
    />

    <!-- Open Graph (LinkedIn, Facebook, Slack, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="My Life in Data" />
    <meta property="og:title" content="My Life in Data" />
    <meta
      property="og:description"
      content="A personal data platform to take ownership of my data. Pretty charts, brutal honesty."
    />
    <meta property="og:url" content="https://mylife-in-data.com" />
    <meta property="og:image" content="https://mylife-in-data.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="The My Life in Data dashboard homepage" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="My Life in Data" />
    <meta
      name="twitter:description"
      content="A personal data platform to take ownership of my data. Pretty charts, brutal honesty."
    />
    <meta name="twitter:image" content="https://mylife-in-data.com/og-image.png" />
    <style>
      /* Pre-React branded splash: shown before the app mounts and to crawlers
         that render the page without running JS (e.g. link-preview bots), so
         the page is never a blank black frame. React's createRoot().render()
         replaces #root on mount, which removes this. */
      html,
      body {
        margin: 0;
        background: #1a1a1a;
      }
      #app-splash {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 24px;
        text-align: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      #app-splash h1 {
        margin: 0;
        font-size: clamp(40px, 9vw, 88px);
        font-weight: 800;
        letter-spacing: -0.02em;
        color: #ffffff;
      }
      #app-splash h1 span {
        color: #1db954;
      }
      #app-splash p {
        margin: 0;
        font-size: clamp(14px, 2.5vw, 20px);
        font-style: italic;
        color: #b3b3b3;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-splash">
        <h1>My Life <span>in Data</span></h1>
        <p>Pretty charts, brutal honesty, optional self-improvement.</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
